<!DOCTYPE html>
<html>
<head>
    <title>Tax Return Feedback</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .container{
            width:500px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            background:#0078D4;
            color:white;
            padding:10px 20px;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Feedback Form</h2>

<form action="/submit" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email">

<label>How was your experience?</label>

<select name="experience">

<option>Very Easy</option>
<option>Easy</option>
<option>Average</option>
<option>Difficult</option>
<option>Very Difficult</option>

</select>

<label>Rate the process (1-5)</label>

<input type="number"
       name="rating"
       min="1"
       max="5"
       required>

<label>Additional comments</label>

<textarea name="comments"
rows="5"></textarea>

<button type="submit">
Submit Feedback
</button>

</form>

</div>

</body>

</html>
