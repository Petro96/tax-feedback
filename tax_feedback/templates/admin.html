<!DOCTYPE html>
<html>
<head>
    <title>Feedback Dashboard</title>
</head>
<body>

<h1>Feedback Dashboard</h1>

<a href="/">Submit another response</a>

<br><br>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Experience</th>
    <th>Rating</th>
    <th>Comments</th>
    <th>Date & Time</th>
    <th>Status</th>
    <th>Review</th>
</tr>

{% for row in feedback %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>
    <td>{{ row[7] }}</td>
    <td>{{ row[8] }}</td>
    <td>

        <form action="/review/{{ row[0] }}" method="POST">

        <select name="status">

            <option>New</option>
            <option>Reviewed</option>
            <option>In Progress</option>
            <option>Resolved</option>

        </select>

        <br><br>

        <textarea
            name="review_notes"
            rows="3"
            cols="25"
            placeholder="Internal notes"></textarea>

        <br><br>

        <button type="submit">
            Save Review
        </button>

        </form>

    </td>


</tr>

{% endfor %}

</table>

</body>
</html>
